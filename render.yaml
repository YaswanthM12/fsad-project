services:
  - type: web
    name: fsad-backend
    runtime: docker
    rootDir: backend
    plan: free
    autoDeploy: true
    healthCheckPath: /api/health
    envVars:
      - key: APP_CORS_ALLOWED_ORIGINS
        sync: false
      - key: APP_JWT_SECRET
        sync: false
      - key: DB_URL
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
