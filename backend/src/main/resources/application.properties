spring.config.import=optional:file:.env[.properties]
spring.application.name=fsad-project
server.port=${PORT:${SERVER_PORT:8080}}

# Database connection (set by Railway or other providers)
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/loanhub?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true

# App settings
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}
app.jwt.secret=${APP_JWT_SECRET:change-me-in-production-32-plus-chars}
